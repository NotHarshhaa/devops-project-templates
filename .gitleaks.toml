title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allowlisted placeholder text for example files"
paths = [
    '''templates\/.*\/secret.yaml''',
    '''templates\/.*\/secret.yaml.example''',
    '''\.env.example''',
    '''terraform.tfvars.example''',
]

# Allow specific common placeholder patterns
[[allowlist.regexes]]
description = "Allow placeholder values in Kubernetes secrets"
regex = '''REPLACE_WITH_[A-Z_]+'''
fileNames = [
    '''secret\.yaml''',
    '''secret\.yaml\.example''',
]

[[allowlist.regexes]]
description = "Allow example placeholder patterns"
regex = '''your-[a-z-]+'''
fileNames = [
    '''secret\.yaml''',
    '''secret\.yaml\.example''',
]

[[allowlist.regexes]]
description = "Allow common placeholder text"
regex = '''(placeholder|example|changeme|CHANGE_ME)'''
