title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allowlisted placeholder text for example files"
paths = [
    '''templates\/.*\/secret.yaml''',
    '''templates\/.*\/secret.yaml.example''',
    '''\.env.example''',
    '''terraform.tfvars.example''',
]

regexes = [
    '''REPLACE_WITH_.*''',
    '''your-.*''',
    '''placeholder''',
    '''example''',
    '''changeme''',
    '''CHANGE_ME''',
]

# Allow specific common placeholder patterns
[[allowlist.regexes]]
description = "Allow placeholder values in Kubernetes secrets"
regex = '''REPLACE_WITH_[A-Z_]+'''
fileNames = [
    '''secret\.yaml''',
    '''secret\.yaml\.example''',
]

[[allowlist.regexes]]
description = "Allow example placeholder patterns"
regex = '''your-[a-z-]+'''
