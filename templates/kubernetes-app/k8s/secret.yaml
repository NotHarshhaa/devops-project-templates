  name: my-app-secrets
  namespace: my-app
  labels:
    app: my-app
    component: secrets
    version: v1
type: Opaque
data:
  # Base64 encoded values
  # Use: echo -n 'your-secret' | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL3VzZXI6cGFzc0Bwb3N0Z3Jlcy5teS1hcHAuc3ZjLmNsdXN0ZXIubG9jYWwvYXBwZGI=  # postgresql://user:pass@postgres.my-app.svc.cluster.local/appdb
  DATABASE_PASSWORD: c3VwZXJzZWNyZXRwYXNzd29yZA==  # supersecretpassword
  REDIS_PASSWORD: cmVkaXNzZWNyZXRwYXNz  # redissecretpass
  JWT_SECRET: bXlzZWNyZXRqd3RrZXl3aXRoaXN2ZXJ5bG9uZ3N0cmluZw==  # mysecretjwtkeywithverylongstring
  API_KEY: YXBpLWtleS12ZXJ5LXNlY3JldC12YWx1ZQ==  # api-key-very-secret-value
  ENCRYPTION_KEY: ZW5jcnlwdGlvbi1rZXktMzItY2hhcmFjdGVycy1sb25n  # encryption-key-32-characters-long
---
