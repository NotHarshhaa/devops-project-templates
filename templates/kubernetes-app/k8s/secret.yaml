apiVersion: v1
kind: Secret
metadata:
  name: my-app-secrets
  namespace: my-app
  labels:
    app: my-app
    component: secrets
    version: v1
type: Opaque
stringData:
  # NOTE: This is an example file. For production, create actual secrets using:
  # kubectl create secret generic my-app-secrets --from-literal=DATABASE_URL=... --from-literal=DATABASE_PASSWORD=...
  DATABASE_URL: "REPLACE_WITH_DATABASE_URL"
  DATABASE_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET_MIN_32_CHARS"
  API_KEY: "REPLACE_WITH_API_KEY"
  ENCRYPTION_KEY: "REPLACE_WITH_ENCRYPTION_KEY_32_CHARS"
---
apiVersion: v1
kind: Secret
metadata:
  name: my-app-secrets-staging
  namespace: my-app-staging
  labels:
    app: my-app
    component: secrets
    version: v1
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_STAGING_DATABASE_URL"
  DATABASE_PASSWORD: "REPLACE_WITH_STAGING_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_STAGING_REDIS_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_STAGING_JWT_SECRET"
  API_KEY: "REPLACE_WITH_STAGING_API_KEY"
  ENCRYPTION_KEY: "REPLACE_WITH_STAGING_ENCRYPTION_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: my-app
  labels:
    app: my-app
    component: registry
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "docker.io": {
          "username": "REPLACE_WITH_DOCKER_USERNAME",
          "password": "REPLACE_WITH_DOCKER_PASSWORD"
        }
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: my-app
  labels:
    app: my-app
    component: tls
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CERTIFICATE_CONTENT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_PRIVATE_KEY_CONTENT
    -----END PRIVATE KEY-----
